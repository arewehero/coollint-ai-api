version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coollink
      POSTGRES_PASSWORD: coollink
      POSTGRES_DB: coollink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://coollink:coollink@db:5432/coollink
      APP_ENV: local
    depends_on:
      - db

volumes:
  pgdata:
